<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f2044"/>
  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#c9a227" stroke-width="18"/>
  <!-- Inner shine -->
  <circle cx="256" cy="256" r="160" fill="#0f2044" opacity="0.5"/>
  <!-- Letter U -->
  <text x="256" y="300" 
        font-family="Georgia, serif" 
        font-size="200" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle" 
        dominant-baseline="middle">U</text>
  <!-- USAM label -->
  <text x="256" y="420" 
        font-family="Arial, sans-serif" 
        font-size="52" 
        font-weight="bold" 
        fill="#c9a227" 
        text-anchor="middle" 
        letter-spacing="8">USAM</text>
  <!-- Top decorative dots -->
  <circle cx="160" cy="110" r="8" fill="#c9a227" opacity="0.6"/>
  <circle cx="256" cy="85" r="8" fill="#c9a227" opacity="0.8"/>
  <circle cx="352" cy="110" r="8" fill="#c9a227" opacity="0.6"/>
</svg>
