ación del ADN sobre la cromatina y la expresión génica?","points":1,"options":["Promueve la formación de eucromatina, activando los genes","Promueve la formación de heterocromatina, silenciando los genes","No tiene ningún efecto sobre la estructura de la cromatina","Destruye la cromatina y fragmenta el ADN"],"correct":1},{"id":1777147988347,"type":"multiple","text":"¿Cómo afectan las modificaciones epigenéticas causadas por la nutrición materna al rendimiento productivo de la descendencia?","points":1,"options":["No tienen ningún efecto sobre el rendimiento productivo","Solo afectan el color del pelaje del animal","Influyen en la ganancia de peso, el desarrollo muscular, la producción de leche y la eficiencia metabólica","Solo afectan la capacidad reproductiva en la edad adulta"],"correct":2}],"created":"25/4/2026, 2:13:59 p. m.","shareUrl":"https://oscargonzalezpleitez-dot.github.io/cuestionarios-usam/?q=69ed208baaba88219739480e","binId":"69ed208baaba88219739480e"},{"id":1777312286432,"name":"Metabolismo del Glucógeno","desc":"","time":5,"showGrade":"yes","questions":[{"id":1777312213189,"type":"multiple","text":"¿Cuál es la función principal de la glucogenólisis hepática?","points":1,"options":["Producir energía exclusivamente para las células del hígado.","Mantener los niveles de glucosa en sangre (glucemia) estables.","Sintetizar proteínas durante el ejercicio.","Almacenar vitaminas en el citosol."],"correct":1},{"id":1777312214169,"type":"multiple","text":"¿Qué enzima está presente en el hígado, pero ausente en el músculo, permitiendo la liberación de glucosa a la sangre?","points":1,"options":["Glucógeno fosforilasa.","Insulina.","Glucosa-6-fosfatasa.","Adrenalina."],"correct":2},{"id":1777312215159,"type":"multiple","text":"¿Cuál es el destino de la glucosa generada por la glucogenólisis en el tejido muscular?","points":1,"options":["Se libera al torrente sanguíneo para ser usada por el cerebro.","Se transforma en glucógeno lineal inmediatamente.","Se utiliza inea con las colas hidrofóbicas de los fosfolípidos.","C) Su grupo hidroxilo polar se orienta hacia las cabezas de los fosfolípidos, mientras que sus anillos rígidos se insertan hacia el interior de la bicapa.","D) Se ubica de forma aleatoria, ya que no posee regiones polares ni apolares."],"correct":2},{"id":1777313791219,"type":"multiple","text":"¿Qué son las balsas lipídicas (lipid rafts) y qué papel desempeña el colesterol en ellas?","points":1,"options":["A) Son regiones de alta fluidez donde el colesterol se elimina para facilitar el paso de carbohidratos.","B) Son microdominios enriquecidos en colesterol y esfingolípidos que sirven como plataformas para la señalización celular.","C) Son poros permanentes en la membrana creados por el exceso de sales biliares.","D) Son acumulaciones de proteínas periféricas que solo aparecen cuando la temperatura baja drásticamente."],"correct":1},{"id":1777313821015,"type":"multiple","text":"Desde una perspectiva clínica veterinaria, ¿qué sucede con un eritrocito (glóbulo rojo) si hay una alteración en sus niveles de colesterol de membrana?","points":1,"options":["A) Se vuelve más flexible y atraviesa los capilares con mayor facilidad.","B) La célula comienza a producir hormonas sexuales de forma descontrolada.","C) La membrana se vuelve rígida o frágil, lo que puede provocar que la célula se rompa (hemólisis) al pasar por capilares estrechos.","D) El eritrocito desarrolla una pared celular similar a la de las plantas para ganar resistencia."],"correct":2},{"id":1777313855170,"type":"multiple","text":"¿Qué efecto tiene el colesterol en la membrana durante temperaturas elevadas?","points":1,"options":["A) Restringe el movimiento excesivo de las colas de los ácidos grasos, otorgando estabilidad mecánica y reduciendo la permeabilidad excesiva.","B) Acelera la formación de dobles enlaces 'cis' en los fosfolípidos para aumentar la fluidez.","C) Provoca que la membrana se cristalice instantáneamente para evitar la entrada de endoto function sync() {
  try {
    localStorage.setItem('usam_quizzes', JSON.stringify(DATA));
    const saved = JSON.parse(localStorage.getItem('usam_quizzes') || '[]');
    document.getElementById('n').textContent = saved.length;
    document.getElementById('ok').style.display = 'block';
    document.getElementById('err').style.display = 'none';
    updateCount();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('ok').style.display = 'none';
  }
}

function updateCount() {
  try {
    const q = JSON.parse(localStorage.getItem('usam_quizzes') || '[]');
    document.getElementById('actual').textContent = q.length > 0
      ? '📋 Actualmente hay ' + q.length + ' cuestionarios en este dispositivo.'
      : '';
  } catch(e) {}
}
updateCount();
</script>
